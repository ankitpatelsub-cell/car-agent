<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta http-equiv="Cache-Control" content="no-store" />
<title>Car Dealership Assistant</title>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script crossorigin src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  :root{--ink:#16263a;--blue:#1f5fae;--bg:#f6f8fb;--card:#fff;--muted:#5b6b7d;--line:#e3e9f0;--green:#2e9e5b}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,"Noto Sans Devanagari","Noto Sans JP",system-ui,sans-serif;color:var(--ink);background:var(--bg);line-height:1.6}
  .wrap{max-width:920px;margin:0 auto;padding:18px}
  header{background:linear-gradient(135deg,#16263a,#1f5fae);color:#fff;padding:22px 18px}
  header h1{font-size:22px;font-weight:900}
  header p{opacity:.9;font-size:13px;margin-top:4px}
  .badge{display:inline-block;background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.35);padding:3px 10px;border-radius:999px;font-size:11px;margin-top:8px;margin-right:6px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px;margin-top:14px}
  textarea,input{width:100%;border:1px solid var(--line);border-radius:10px;padding:10px;font-size:15px;font-family:inherit;margin-top:6px}
  .chips{margin-top:8px;display:flex;flex-wrap:wrap;gap:6px}
  .chip{background:#eef3fa;color:var(--blue);border:1px solid #d6e2f5;border-radius:999px;padding:6px 12px;font-size:12px;cursor:pointer}
  button.go{margin-top:10px;background:var(--blue);color:#fff;font-weight:800;border:none;border-radius:10px;padding:12px 20px;font-size:15px;cursor:pointer}
  .lang{float:right}
  .lang button{background:#fff;color:var(--blue);border:none;border-radius:8px;padding:4px 10px;margin-left:6px;cursor:pointer;font-weight:700}
  .trace{font-family:ui-monospace,Menlo,monospace;font-size:13px}
  .step{border-left:3px solid var(--line);padding:6px 10px;margin:6px 0;background:#fafcff;border-radius:0 8px 8px 0}
  .step.value,.step.match,.step.finance,.step.testdrive,.step.docs{border-color:var(--blue)} .step.think{border-color:#7a4fd0} .step.done{border-color:var(--amber,#b8860b)} .step.follow{border-color:var(--green)}
  .step b{font-size:11px;text-transform:uppercase;color:var(--muted)}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  h3{font-size:14px;color:var(--muted);margin:14px 0 4px}
  .tk{display:flex;justify-content:space-between;gap:8px;border:1px solid var(--line);border-radius:10px;padding:8px 10px;margin-top:6px;background:#fff;font-size:13px}
  .tk .id{font-weight:800;color:var(--blue)}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect}=React;
const T={
  en:{t1:'🚗 Car Dealership Assistant',t2:'Multi-brand used cars · India · buy / sell-value / finance / test-drive / RC docs',msg:'Message from customer (WhatsApp/site/voice/SMS)',ex:'e.g. "I want Honda City, 5 lakh budget" or "value my 2020 Maruti Swift 40k km"',send:'Send',leads:'Leads',book:'Test-drives',fu:'Follow-ups',ch:'via'},
  hi:{t1:'🚗 कार डीलर सहायक',t2:'मल्टी-ब्रांड पुरानी कारें · भारत · खरीद / मूल्य / लोन / टेस्ट-ड्राइव / RC',msg:'ग्राहक का संदेश (WhatsApp/साइट/कॉल/SMS)',ex:'जैसे "हमें Honda City चाहिए, 5 लाख बजट" या "मेरी 2020 Maruti Swift 40k km का मूल्य"',send:'भेजें',leads:'लीड्स',book:'टेस्ट-ड्राइव',fu:'फॉलो-अप',ch:'माध्यम'}
};
function App(){
  const [loc,setLoc]=useState('en');
  const [text,setText]=useState('');
  const [trace,setTrace]=useState([]);
  const [mem,setMem]=useState({leads:[],bookings:[],followups:[]});
  const [busy,setBusy]=useState(false);
  const L=T[loc];
  const ex=['I want Honda City, 5 lakh budget','value my 2020 Maruti Swift 40000 km','EMI for 6 lakh car','book test drive for Hyundai i20','RC transfer documents needed','मुझे Maruti Brezza चाहिए 7 लाख'];
  async function refresh(){ const s=await fetch('/api/state').then(r=>r.json()); setMem(s); }
  useEffect(()=>{refresh();},[]);
  async function send(t){ if(!t.trim())return; setBusy(true); setTrace([]);
    try{ const r=await fetch('/api/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({text:t,channel:'whatsapp',locale:loc})});
      const d=await r.json();
      for(const s of d.steps){ setTrace(prev=>[...prev,s]); await new Promise(res=>setTimeout(res,250)); }
      setText('');
    }catch(e){ setTrace([{tool:'error',result:e.message}]); }
    setBusy(false); refresh();
  }
  return (
    <div>
      <header><div className="wrap" style={{padding:0}}>
        <div className="lang">{['en','hi'].map(x=><button key={x} onClick={()=>setLoc(x)} style={{background:x===loc?'#fff':'rgba(255,255,255,.2)',color:x===loc?'var(--blue)':'#fff'}}>{x==='en'?'EN':'हिं'}</button>)}</div>
        <h1>{L.t1}</h1><p>{L.t2}</p>
        <span className="badge">भारत / India</span><span className="badge">Port 8097</span>
      </div></header>
      <div className="wrap">
        <div className="card">
          <h3 style={{marginTop:0}}>{L.msg}</h3>
          <textarea value={text} onChange={e=>setText(e.target.value)} placeholder={L.ex}></textarea>
          <div className="chips">{ex.map((e,i)=><span key={i} className="chip" onClick={()=>send(e)}>{e.length>28?e.slice(0,26)+'…':e}</span>)}</div>
          <button className="go" disabled={busy} onClick={()=>send(text)}>{L.send}</button>
        </div>
        {trace.length>0&&<div className="card"><h3 style={{marginTop:0}}>Agent</h3>
          <div className="trace">{trace.map((s,i)=><div key={i} className={'step '+s.tool}><b>{s.tool}</b><div>{s.result}</div></div>)}</div>
        </div>}
        <div className="grid2">
          <div className="card"><h3 style={{marginTop:0}}>{L.leads}</h3>
            {mem.leads.slice(0,8).map(l=><div key={l.id} className="tk"><span><b>{l.id}</b> {l.text.slice(0,40)}<br/><small style={{color:'#5b6b7d'}}>{l.intent} · {L.ch}:{l.channel}</small></span><span>{l.status}</span></div>)}
            {!mem.leads.length&&<small style={{color:'#5b6b7d'}}>—</small>}
          </div>
          <div className="card"><h3 style={{marginTop:0}}>{L.book} / {L.fu}</h3>
            {mem.bookings.map(b=><div key={b.id} className="tk"><span><b>{b.id}</b> {b.text.slice(0,30)}</span><span>{b.status}</span></div>)}
            {mem.followups.map(f=><div key={f.id} className="tk"><span><b>{f.id}</b> follow-up {f.lead||''}</span><span>{f.done?'done':'pending'}</span></div>)}
            {!mem.bookings.length&&!mem.followups.length&&<small style={{color:'#5b6b7d'}}>—</small>}
          </div>
        </div>
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
