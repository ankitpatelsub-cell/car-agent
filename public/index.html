<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta http-equiv="Cache-Control" content="no-store" />
<title>Shree Auto — New & Used Cars</title>
<style>
  :root{--ink:#16263a;--blue:#1f5fae;--bg:#f6f8fb;--card:#fff;--muted:#5b6b7d;--line:#e3e9f0;--green:#2e9e5b;--amber:#b8860b}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,"Noto Sans Devanagari",system-ui,sans-serif;color:var(--ink);background:var(--bg);line-height:1.6}
  header{background:linear-gradient(135deg,#16263a,#1f5fae);color:#fff;padding:18px}
  header .wrap{max-width:1000px;margin:0 auto;display:flex;justify-content:space-between;align-items:center}
  header h1{font-size:20px;font-weight:900}
  header p{opacity:.9;font-size:12px}
  header a{color:#fff;font-size:13px;text-decoration:none;background:rgba(255,255,255,.15);padding:6px 12px;border-radius:8px}
  .wrap{max-width:1000px;margin:0 auto;padding:16px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px;margin-top:14px}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:12px}
  .car{background:#fff;border:1px solid var(--line);border-radius:12px;padding:14px}
  .car .brand{font-weight:800;color:var(--blue);text-transform:capitalize}
  .car .price{font-weight:800;font-size:18px;margin-top:6px}
  .car .meta{font-size:12px;color:var(--muted)}
  input,select,textarea{width:100%;border:1px solid var(--line);border-radius:10px;padding:10px;font-size:15px;margin-top:6px;font-family:inherit}
  .row{display:flex;gap:10px;flex-wrap:wrap}
  button.go{background:var(--blue);color:#fff;font-weight:800;border:none;border-radius:10px;padding:12px 18px;font-size:15px;cursor:pointer;margin-top:10px}
  .lang{float:right}
  .lang button{background:#fff;color:var(--blue);border:none;border-radius:8px;padding:4px 10px;margin-left:6px;cursor:pointer;font-weight:700}
  .result{background:#eef6ff;border:1px solid #cfe2f7;border-radius:10px;padding:12px;margin-top:10px;font-size:14px;white-space:pre-wrap}
  h3{font-size:14px;color:var(--muted);margin:6px 0}
  .chips{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
  .chip{background:#eef3fa;color:var(--blue);border:1px solid #d6e2f5;border-radius:999px;padding:5px 11px;font-size:12px;cursor:pointer}
</style>
</head>
<body>
<header><div class="wrap">
  <div><h1>🚗 Shree Auto</h1><p>New cars · exchange · certified used — Ahmedabad</p></div>
  <a href="/admin">Staff Login</a>
</div></header>
<div class="wrap">
  <div class="card">
    <h3>Ask the assistant (WhatsApp-style)</h3>
    <textarea id="msg" rows="2" placeholder="e.g. exchange my 2019 Maruti Swift 50000 km for new 8 lakh car"></textarea>
    <div class="chips">
      <span class="chip" onclick="send('on-road price of Hyundai 9 lakh')">On-road ₹9L</span>
      <span class="chip" onclick="send('exchange my 2019 Maruti Swift 50000 km for new 8 lakh')">Exchange</span>
      <span class="chip" onclick="send('used car under 6 lakh honda')">Used <6L</span>
      <span class="chip" onclick="send('book test drive for Hyundai i20')">Test-drive</span>
    </div>
    <button class="go" onclick="send(document.getElementById('msg').value)">Send</button>
    <div id="res"></div>
  </div>

  <div class="card">
    <h3>Stock ({<span id="cnt">0</span>} cars)</h3>
    <div class="row" style="margin-bottom:8px">
      <select id="fbrand" onchange="load()"><option value="">All brands</option><option>maruti</option><option>hyundai</option><option>toyota</option><option>honda</option><option>tata</option><option>kia</option><option>mahindra</option></select>
      <input id="fbudget" style="width:160px" placeholder="Max budget (lakh)" onchange="load()" />
    </div>
    <div class="grid" id="cars"></div>
  </div>
</div>
<script>
async function load(){
  const b=document.getElementById('fbrand').value, bud=document.getElementById('fbudget').value;
  let url='/api/cars'; const q=[]; if(b)q.push('brand='+b); if(bud)q.push('budget='+bud); if(q.length)url+='?'+q.join('&');
  const cars=await fetch('/api/cars').then(r=>r.json());
  document.getElementById('cnt').textContent=cars.length;
  document.getElementById('cars').innerHTML=cars.map(c=>`<div class="car"><div class="brand">${c.brand} ${c.model}</div><div class="meta">${c.year} · ${c.fuel} · ${c.km.toLocaleString()} km</div><div class="price">₹${(c.price/1e5).toFixed(2)}L</div><div class="meta">${c.city}</div></div>`).join('');
}
async function send(t){ if(!t.trim())return; const r=await fetch('/api/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({text:t,channel:'web',locale:'en'})}); const d=await r.json();
  document.getElementById('res').innerHTML='<div class="result">'+d.steps.map(s=>'<b>'+s.tool+'</b>: '+s.result).join('<br>')+'</div>'; }
load();
</script>
</body>
</html>
