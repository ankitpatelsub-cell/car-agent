<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta http-equiv="Cache-Control" content="no-store" />
<title>Shree Auto — Staff Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
<style>
  :root{--ink:#0f1f33;--blue:#1f5fae;--bg:#f4f7fb;--card:#fff;--muted:#5b6b7d;--line:#e6ecf3;--green:#1ba672}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Inter',system-ui,sans-serif;color:var(--ink);background:var(--bg);line-height:1.5}
  header{background:linear-gradient(135deg,#0f1f33,#1f5fae);color:#fff;padding:14px 0}
  .nav{max-width:1040px;margin:0 auto;padding:0 18px;display:flex;justify-content:space-between;align-items:center}
  .nav a{color:#fff;text-decoration:none;background:rgba(255,255,255,.16);padding:8px 14px;border-radius:10px;font-size:13px;font-weight:600}
  .wrap{max-width:1040px;margin:0 auto;padding:18px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:18px;margin-top:16px;box-shadow:0 10px 30px -24px rgba(15,31,51,.4)}
  h3{color:var(--muted);font-size:13px;text-transform:uppercase;letter-spacing:.6px;margin-bottom:10px}
  .row{display:grid;grid-template-columns:repeat(7,1fr);gap:8px}
  input{height:40px;border:1px solid var(--line);border-radius:10px;padding:0 12px;font-size:14px;font-family:inherit;width:100%}
  .add{background:var(--green);color:#fff;border:none;border-radius:10px;padding:12px 20px;font-weight:800;cursor:pointer;margin-top:12px;font-size:15px}
  .add:hover{filter:brightness(.95)}
  .del{background:#fde2e2;color:#c0392b;border:none;border-radius:8px;padding:5px 10px;font-size:12px;cursor:pointer;font-weight:700}
  table{width:100%;border-collapse:collapse;font-size:13.5px}
  th,td{text-align:left;padding:9px 8px;border-bottom:1px solid var(--line)}
  th{color:var(--muted);font-weight:700;font-size:12px;text-transform:uppercase}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
  .pill{display:inline-block;background:#eef4fd;color:var(--blue);border-radius:999px;padding:2px 9px;font-size:11px;font-weight:700}
  /* login overlay */
  #login{position:fixed;inset:0;background:rgba(15,31,51,.96);display:flex;align-items:center;justify-content:center;z-index:50}
  #login .box{background:#fff;padding:28px;border-radius:16px;width:320px}
  #login h3{margin-bottom:10px;text-transform:none;font-size:18px;color:var(--ink)}
  #lerr{color:#c0392b;font-size:12px;margin-top:8px;min-height:14px}
</style>
</head>
<body>
<header><div class="nav"><div style="font-weight:900;font-size:18px">🚗 Shree Auto · Staff</div><a href="/">← Customer site</a></div></header>
<div class="wrap">
  <div class="card">
    <h3>Add car to stock</h3>
    <div class="row">
      <input id="brand" placeholder="brand"><input id="model" placeholder="model">
      <input id="year" placeholder="year" type="number"><input id="fuel" placeholder="fuel"><input id="km" placeholder="km" type="number">
      <input id="price" placeholder="price ₹" type="number"><input id="city" placeholder="city">
    </div>
    <button class="add" onclick="addCar()">+ Add car</button>
  </div>
  <div class="grid2">
    <div class="card"><h3>Stock</h3><div id="cars" style="max-height:340px;overflow:auto"></div></div>
    <div class="card"><h3>Leads</h3><div id="leads" style="max-height:340px;overflow:auto"></div></div>
  </div>
  <div class="card"><h3>Test-drive / bookings</h3><div id="bookings"></div></div>
  <div class="card"><h3>🧠 Model Settings <span style="font-weight:400;text-transform:none;color:var(--muted)">· live switch</span></h3>
    <div id="provBtns" style="display:flex;gap:8px;flex-wrap:wrap">
      <button class="add" style="background:#1f5fae;margin-top:0" onclick="setProv('claude')">Claude (free)</button>
      <button class="add" style="background:#1f5fae;margin-top:0" onclick="setProv('auto')">Auto (failover)</button>
      <button class="add" style="background:#1f5fae;margin-top:0" onclick="setProv('openrouter')">OpenRouter</button>
    </div>
    <div style="display:flex;gap:8px;margin-top:10px;align-items:center">
      <input id="orModel" placeholder="OpenRouter model (e.g. anthropic/claude-sonnet-4)" style="flex:1">
      <button class="add" style="margin-top:0" onclick="saveProv()">Save</button>
    </div>
    <div id="provInfo" style="font-size:12px;color:var(--muted);margin-top:10px"></div>
  </div>
</div>
<div id="login"><div class="box">
  <h3>Staff login</h3>
  <input id="pass" type="password" placeholder="admin password" />
  <button class="add" style="width:100%" onclick="login()">Login</button>
  <div id="lerr"></div>
</div></div>
<script>
const TOKEN=localStorage.getItem('car_admin_token')||'';
function authH(){ return TOKEN?{'Content-Type':'application/json','x-auth-token':TOKEN}:{'Content-Type':'application/json'}; }
async function login(){ const r=await fetch('/api/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({password:pass.value})});
  if(r.ok){ const d=await r.json(); localStorage.setItem('car_admin_token',d.token); location.reload(); }
  else lerr.textContent='wrong password'; }
if(!TOKEN){ document.body.style.overflow='hidden'; }
else { login.style.display='none'; }
async function load(){
  const cars=await fetch('/api/cars').then(r=>r.json());
  document.getElementById('cars').innerHTML='<table>'+cars.map(c=>`<tr><td>#${c.id}</td><td><b>${c.brand} ${c.model}</b></td><td>${c.year}</td><td>${c.fuel}</td><td>${c.km}km</td><td>₹${(c.price/1e5).toFixed(2)}L</td><td><button class="del" onclick="delCar(${c.id})">sold</button></td></tr>`).join('')+'</table>';
  const leads=await fetch('/api/leads',{headers:authH()}).then(r=>r.ok?r.json():[]);
  document.getElementById('leads').innerHTML=(leads.map?leads.map(l=>`<div style="padding:6px 0;border-bottom:1px solid var(--line);font-size:13.5px"><span class="pill">${l.intent}</span> ${l.text.slice(0,52)} <small style="color:var(--muted)">· ${l.channel}</small></div>`).join(''):'<i>login required</i>'))||'—';
  const bk=await fetch('/api/bookings',{headers:authH()}).then(r=>r.ok?r.json():[]);
  document.getElementById('bookings').innerHTML=(bk.map?bk.map(b=>`<div style="padding:6px 0;border-bottom:1px solid var(--line);font-size:13.5px">${b.text.slice(0,64)} <small style="color:var(--muted)">[${b.status}]</small></div>`).join(''):'—')||'—';
}
async function addCar(){ const b={brand:brand.value,model:model.value,year:+year.value,fuel:fuel.value,km:+km.value,price:+price.value,city:city.value||'Ahmedabad'};
  if(!b.brand||!b.model||!b.price)return alert('brand, model, price required');
  const r=await fetch('/api/cars',{method:'POST',headers:authH(),body:JSON.stringify(b)}); if(r.status===401)return alert('login expired');
  [brand,model,year,fuel,km,price,city].forEach(i=>i.value=''); load(); }
async function delCar(id){ await fetch('/api/cars/delete',{method:'POST',headers:authH(),body:JSON.stringify({id})}); load(); }
async function setProv(p){ const r=await fetch('/api/set-provider',{method:'POST',headers:authH(),body:JSON.stringify({provider:p})}); const s=await r.json(); renderProv(s); }
async function saveProv(){ const m=document.getElementById('orModel').value.trim(); const cur=document.getElementById('provInfo').dataset.p||'claude'; const r=await fetch('/api/set-provider',{method:'POST',headers:authH(),body:JSON.stringify({provider:cur,openrouter_model:m})}); const s=await r.json(); renderProv(s); }
async function renderProv(s){ document.getElementById('provInfo').dataset.p=s.provider;
  document.getElementById('provInfo').innerHTML=`Provider: <b>${s.provider}</b> · Claude CLI: ${s.claude_cli?'✅':'❌'} · OpenRouter key: ${s.openrouter_key==='set'?'✅ set':'⚠️ missing'}${s.openrouter_model?` · model: <code>${s.openrouter_model}</code>`:''}<br/>Auto mode fails over Claude↔OpenRouter on token/rate-limit.`;
  if(s.openrouter_model) document.getElementById('orModel').value=s.openrouter_model;
  document.querySelectorAll('#provBtns button').forEach(b=>b.style.outline = (b.textContent.toLowerCase().includes(s.provider))?'3px solid #1ba672':'none'); }
if(TOKEN){ load(); fetch('/api/settings',{headers:authH()}).then(r=>r.json()).then(renderProv).catch(()=>{}); }
</script>
</body>
</html>
